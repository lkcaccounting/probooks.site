<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Books - LKC Accounting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f9fafb; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    // ==========================================
    // 1. CONFIGURATION (PASTE YOUR KEYS HERE)
    // ==========================================
    const SUPABASE_URL = "YOUR_SUPABASE_URL"; 
    const SUPABASE_KEY = "YOUR_SUPABASE_KEY";
    const ADMIN_MASTER_PASSWORD = "LKCAdmin2024!"; // Your Global Admin Password
    const GEMINI_API_KEY = "YOUR_FREE_GEMINI_KEY"; // Optional: Get free at aistudio.google.com

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ==========================================
    // 2. MAIN APP ROUTER
    // ==========================================
    function App() {
        const [view, setView] = React.useState('login'); // login, admin, owner, manager, pos
        const [user, setUser] = React.useState(null);
        const [loading, setLoading] = React.useState(true);

        React.useEffect(() => {
            // Check if user is already logged in on page refresh
            db.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    setUser(session.user);
                    routeUser(session.user);
                }
                setLoading(false);
            });
        }, []);

        const routeUser = async (currentUser) => {
            const { data: profile } = await db.from('profiles').select('role').eq('id', currentUser.id).single();
            if (profile) {
                if (profile.role === 'owner') setView('owner');
                else if (profile.role === 'manager') setView('manager');
                else if (profile.role === 'salesperson') setView('pos');
            }
        };

        const logout = async () => {
            await db.auth.signOut();
            setUser(null);
            setView('login');
        };

        if (loading) return <div className="p-10 text-center text-xl">Loading Pro Books...</div>;

        return (
            <div className="min-h-screen">
                {view === 'login' && <Login setView={setView} setUser={setUser} routeUser={routeUser} />}
                {view === 'admin' && <AdminSetup setView={setView} />}
                {view === 'owner' && <OwnerDashboard user={user} logout={logout} />}
                {view === 'manager' && <ManagerDashboard user={user} logout={logout} />}
                {view === 'pos' && <SalesPOS user={user} logout={logout} />}
            </div>
        );
    }

    // ==========================================
    // 3. LOGIN SCREEN
    // ==========================================
    function Login({ setView, setUser, routeUser }) {
        const [name, setName] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [error, setError] = React.useState('');

        const handleLogin = async (e) => {
            e.preventDefault();
            setError('');
            // We format the name into a system email behind the scenes
            const email = name.toLowerCase().replace(/\s+/g, '') + '@probooks.app';
            
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) {
                setError('Invalid Name or Password.');
            } else {
                setUser(data.user);
                routeUser(data.user);
            }
        };

        return (
            <div className="flex items-center justify-center min-h-screen p-4">
                <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
                    <h2 className="text-2xl font-bold text-center mb-6 text-blue-700">Pro Books Login</h2>
                    <form onSubmit={handleLogin} className="space-y-4">
                        <input type="text" placeholder="Your Name" className="w-full p-3 border rounded-lg" value={name} onChange={e => setName(e.target.value)} required />
                        <input type="password" placeholder="Password" className="w-full p-3 border rounded-lg" value={password} onChange={e => setPassword(e.target.value)} required />
                        {error && <p className="text-red-500 text-sm text-center">{error}</p>}
                        <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700">Sign In</button>
                    </form>
                    <p className="text-center text-sm text-gray-500 mt-6">
                        Global Admin? <button onClick={() => setView('admin')} className="text-blue-600 underline">Setup New Business</button>
                    </p>
                </div>
            </div>
        );
    }

    // ==========================================
    // 4. ADMIN SETUP (YOUR MASTER GATE)
    // ==========================================
    function AdminSetup({ setView }) {
        const [masterPass, setMasterPass] = React.useState('');
        const [step, setStep] = React.useState(1);
        const [bizName, setBizName] = React.useState('');
        const [ownerName, setOwnerName] = React.useState('');
        const [ownerPass, setOwnerPass] = React.useState('');
        const [msg, setMsg] = React.useState('');

        const verifyAdmin = () => {
            if (masterPass === ADMIN_MASTER_PASSWORD) setStep(2);
            else setMsg('Invalid Master Password.');
        };

        const createBusiness = async (e) => {
            e.preventDefault();
            setMsg('Creating...');
            // 1. Create Business
            const { data: biz, error: bizErr } = await db.from('businesses').insert([{ name: bizName }]).select().single();
            if (bizErr) return setMsg('Error: ' + bizErr.message);

            // 2. Create Owner
            const email = ownerName.toLowerCase().replace(/\s+/g, '') + '@probooks.app';
            const { error: authErr } = await db.auth.signUp({
                email, password: ownerPass,
                options: { data: { full_name: ownerName, role: 'owner', business_id: biz.id } }
            });
            if (authErr) return setMsg('Error: ' + authErr.message);

            setMsg('Success! Business and Owner created. Go to Login.');
            setTimeout(() => setView('login'), 2000);
        };

        return (
            <div className="flex items-center justify-center min-h-screen p-4 bg-gray-100">
                <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
                    <h2 className="text-2xl font-bold mb-6 text-red-600">Global Admin Gate</h2>
                    {step === 1 ? (
                        <div className="space-y-4">
                            <input type="password" placeholder="Master License Key" className="w-full p-3 border rounded-lg" value={masterPass} onChange={e => setMasterPass(e.target.value)} />
                            <button onClick={verifyAdmin} className="w-full bg-red-600 text-white p-3 rounded-lg">Unlock</button>
                        </div>
                    ) : (
                        <form onSubmit={createBusiness} className="space-y-4">
                            <input type="text" placeholder="Business Name" className="w-full p-3 border rounded-lg" value={bizName} onChange={e => setBizName(e.target.value)} required />
                            <input type="text" placeholder="Owner Full Name" className="w-full p-3 border rounded-lg" value={ownerName} onChange={e => setOwnerName(e.target.value)} required />
                            <input type="password" placeholder="Owner Password" className="w-full p-3 border rounded-lg" value={ownerPass} onChange={e => setOwnerPass(e.target.value)} required />
                            <button type="submit" className="w-full bg-green-600 text-white p-3 rounded-lg">Deploy Business</button>
                        </form>
                    )}
                    {msg && <p className="mt-4 text-center font-medium text-gray-700">{msg}</p>}
                    <button onClick={() => setView('login')} className="w-full mt-4 text-sm text-gray-500 underline">Back to Login</button>
                </div>
            </div>
        );
    }

    // ==========================================
    // 5. DASHBOARDS & POS
    // ==========================================
    function OwnerDashboard({ user, logout }) {
        const [aiPrompt, setAiPrompt] = React.useState('');
        const [aiResponse, setAiResponse] = React.useState('I am your AI Accountant. Ask me about VAT, PAYE, or business anomalies.');

        const askAI = async () => {
            setAiResponse('Thinking...');
            // In a real app, this would fetch your sales data and send it to Gemini.
            // For now, it simulates the connection.
            setAiResponse(`As the AI Accountant, I've analyzed your ledger. Based on the current data, I've automatically categorized your recent KPLC and transport expenses, and flagged 2 voided sales by a salesperson for your review. Your estimated VAT liability for this month is KES 14,500.`);
        };

        return (
            <div className="p-6 max-w-4xl mx-auto">
                <div className="flex justify-between items-center mb-8">
                    <h1 className="text-3xl font-bold">Owner Dashboard</h1>
                    <button onClick={logout} className="text-red-500 underline">Logout</button>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div className="bg-white p-6 rounded-lg shadow border">
                        <h3 className="font-bold mb-2">Financial Overview</h3>
                        <p className="text-2xl text-green-600">KES 450,000 <span className="text-sm text-gray-500">Revenue</span></p>
                        <p className="text-sm text-red-500 mt-2">3 Pending Edit Requests from Sales Staff</p>
                    </div>
                    <div className="bg-white p-6 rounded-lg shadow border">
                        <h3 className="font-bold mb-2">Staff Activity</h3>
                        <p>Salesperson 1: 14 Sales (M-Pesa)</p>
                        <p>Salesperson 2: 8 Sales (Cash)</p>
                    </div>
                </div>

                <div className="bg-indigo-900 text-white p-6 rounded-lg shadow-lg">
                    <h3 className="text-xl font-bold mb-4 flex items-center gap-2">🤖 AI Accountant (Exclusive)</h3>
                    <p className="text-sm text-indigo-200 mb-4">{aiResponse}</p>
                    <div className="flex gap-2">
                        <input type="text" placeholder="e.g. Calculate my PAYE liability..." className="flex-1 p-2 rounded text-black" value={aiPrompt} onChange={e => setAiPrompt(e.target.value)} />
                        <button onClick={askAI} className="bg-indigo-500 px-4 rounded hover:bg-indigo-400">Ask</button>
                    </div>
                </div>
            </div>
        );
    }

    function ManagerDashboard({ user, logout }) {
        return (
            <div className="p-6 max-w-4xl mx-auto">
                <div className="flex justify-between items-center mb-8">
                    <h1 className="text-3xl font-bold">Manager Dashboard</h1>
                    <button onClick={logout} className="text-red-500 underline">Logout</button>
                </div>
                <div className="bg-white p-6 rounded-lg shadow border">
                    <h3 className="font-bold mb-4">Inventory & Sales Reports</h3>
                    <div className="bg-red-50 p-3 rounded border border-red-200 text-red-700 mb-4">⚠️ Alert: 'Premium Item X' is below low stock threshold (3 left).</div>
                    <p>Here you can view sales reports, monitor stock levels, and generate invoices. (Financials hidden).</p>
                </div>
            </div>
        );
    }

    function SalesPOS({ user, logout }) {
        const [qty, setQty] = React.useState(1);
        const [payment, setPayment] = React.useState('M-Pesa');
        
        const recordSale = () => {
            alert('Sale Recorded! \n\nNote: You cannot edit this. If you made a mistake, you must submit an Edit Request to the Owner.');
        };

        return (
            <div className="p-6 max-w-md mx-auto">
                <div className="flex justify-between items-center mb-8">
                    <h1 className="text-2xl font-bold">Sales Terminal</h1>
                    <button onClick={logout} className="text-red-500 underline">Logout</button>
                </div>
                <div className="bg-white p-6 rounded-lg shadow border space-y-4">
                    <h3 className="font-bold">Record New Sale</h3>
                    <div>
                        <label className="block text-sm mb-1">Item: Standard Widget</label>
                        <p className="text-lg font-bold">KES 1,500 <span className="text-sm text-gray-500">/ unit</span></p>
                    </div>
                    <div>
                        <label className="block text-sm mb-1">Quantity</label>
                        <input type="number" min="1" className="w-full p-2 border rounded" value={qty} onChange={e => setQty(e.target.value)} />
                    </div>
                    <div>
                        <label className="block text-sm mb-1">Payment Method</label>
                        <select className="w-full p-2 border rounded" value={payment} onChange={e => setPayment(e.target.value)}>
                            <option>M-Pesa</option>
                            <option>Cash</option>
                            <option>Card</option>
                        </select>
                    </div>
                    <div className="pt-4 border-t">
                        <p className="text-xl font-bold mb-4">Total: KES {1500 * qty}</p>
                        <button onClick={recordSale} className="w-full bg-green-600 text-white p-3 rounded-lg font-bold">Complete Sale</button>
                    </div>
                </div>
            </div>
        );
    }

    // ==========================================
    // 6. MOUNT APP
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
