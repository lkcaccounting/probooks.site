<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProBooks — Dashboard</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>

  <div class="main-content">
    <div class="topbar">
      <div class="flex" style="gap:12px;align-items:center;">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title">Dashboard</span>
      </div>
      <div class="topbar-right">
        <button class="notif-btn" onclick="toggleNotifPanel()" id="notif-btn">
          🔔
          <span class="notif-badge hidden" id="notif-badge">0</span>
        </button>
      </div>
    </div>

    <!-- Notifications panel -->
    <div class="notif-panel" id="notif-panel">
      <div class="notif-header">
        <strong>Notifications</strong>
        <button class="btn btn-outline btn-sm" onclick="markAllRead()">Mark all read</button>
      </div>
      <div id="notif-list"></div>
    </div>

    <div class="page-body">
      <div id="alert-box"></div>

      <!-- Period selector -->
      <div class="flex-between mb-24">
        <div>
          <h2 style="font-size:16px;font-weight:600;" id="greeting">Good morning 👋</h2>
          <p class="text-muted" id="biz-name-display"></p>
        </div>
        <select class="form-control" style="width:auto;" id="period-select" onchange="loadDashboard()">
          <option value="month">This Month</option>
          <option value="year">This Year</option>
          <option value="all">All Time</option>
        </select>
      </div>

      <!-- Stats -->
      <div class="stat-grid" id="stats-grid">
        <div class="stat-card"><div class="label">Total Income</div><div class="value green" id="stat-income">—</div></div>
        <div class="stat-card"><div class="label">Total Expenses</div><div class="value red" id="stat-expenses">—</div></div>
        <div class="stat-card"><div class="label">Net Profit</div><div class="value blue" id="stat-profit">—</div></div>
        <div class="stat-card"><div class="label">Sales Count</div><div class="value purple" id="stat-sales">—</div></div>
      </div>

      <!-- Low stock alerts -->
      <div class="card mb-24" id="low-stock-section" style="display:none;">
        <div class="flex-between mb-16">
          <strong>⚠️ Low Stock Alerts</strong>
          <a href="stock.html" class="btn btn-outline btn-sm">View Stock</a>
        </div>
        <div id="low-stock-list"></div>
      </div>

      <!-- Recent transactions -->
      <div class="card">
        <div class="flex-between mb-16">
          <strong>Recent Transactions</strong>
          <a href="income.html" class="btn btn-outline btn-sm">View All</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Type</th><th>Description</th>
                <th>Method</th><th>Recorded By</th><th class="text-right">Amount</th>
              </tr>
            </thead>
            <tbody id="recent-tx-body">
              <tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text2);">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/ui.js"></script>
<script>
  const user = requireAuth(["owner"]);
  if (!user) throw new Error("Unauthorized");

  // Build UI
  document.getElementById("sidebar-container").innerHTML = buildSidebar(user);
  highlightCurrentPage();

  // Greeting
  const hr = new Date().getHours();
  document.getElementById("greeting").textContent =
    (hr < 12 ? "Good morning" : hr < 17 ? "Good afternoon" : "Good evening") + ` ${user.name} 👋`;
  document.getElementById("biz-name-display").textContent = user.businessName;

  async function loadDashboard() {
    const period = document.getElementById("period-select").value;
    const summary = await getSummary(user.businessId, period);
    const settings = await getBusinessSettings(user.businessId);
    const cur = settings?.currency || "KES";

    document.getElementById("stat-income").textContent = formatCurrency(summary.income, cur);
    document.getElementById("stat-expenses").textContent = formatCurrency(summary.expenses, cur);
    document.getElementById("stat-profit").textContent = formatCurrency(summary.profit, cur);
    document.getElementById("stat-sales").textContent = summary.salesCount;

    // Recent 10 transactions
    const tbody = document.getElementById("recent-tx-body");
    const tx = summary.transactions.slice(0, 10);
    if (tx.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text2);">No transactions yet.</td></tr>';
    } else {
      tbody.innerHTML = tx.map(t => {
        const typeMap = { sale: "badge-green", income: "badge-blue", expense: "badge-red", restock: "badge-yellow" };
        return `<tr>
          <td>${formatDate(t.date)}</td>
          <td><span class="badge ${typeMap[t.type] || "badge-blue"}">${t.type}</span></td>
          <td>${t.itemName || t.category || t.description || "—"}</td>
          <td>${t.paymentMethod || "—"}</td>
          <td>${t.recordedBy || "owner"}</td>
          <td class="text-right mono">${formatCurrency(t.amount, cur)}</td>
        </tr>`;
      }).join("");
    }

    // Low stock
    const stock = await getStockItems(user.businessId);
    const low = stock.filter(s => s.quantity <= (s.reorderLevel || 5));
    if (low.length > 0) {
      document.getElementById("low-stock-section").style.display = "block";
      document.getElementById("low-stock-list").innerHTML = low.map(s => `
        <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border);">
          <span>${s.name}</span>
          <span class="badge badge-red">${s.quantity} left (reorder at ${s.reorderLevel || 5})</span>
        </div>
      `).join("");
    }
  }

  async function toggleNotifPanel() {
    const panel = document.getElementById("notif-panel");
    panel.classList.toggle("open");
    if (panel.classList.contains("open")) await loadNotifications();
  }

  async function loadNotifications() {
    const notifs = await getNotifications(user.businessId);
    const list = document.getElementById("notif-list");
    if (notifs.length === 0) {
      list.innerHTML = '<div class="notif-empty">No notifications</div>';
      return;
    }
    list.innerHTML = notifs.map(n => `
      <div class="notif-item ${n.read ? "" : "unread"}" onclick="markRead('${n.id}',this)">
        <div>${n.type === "lowstock" ? "⚠️" : "💰"} ${n.message}</div>
        <div class="notif-time">${timeAgo(n.createdAt)}</div>
      </div>
    `).join("");
    await loadNotifBadge(user.businessId);
  }

  async function markRead(id, el) {
    await markNotificationRead(user.businessId, id);
    el.classList.remove("unread");
    await loadNotifBadge(user.businessId);
  }

  async function markAllRead() {
    await markAllNotificationsRead(user.businessId);
    await loadNotifications();
  }

  loadDashboard();
  loadNotifBadge(user.businessId);
</script>
</body>
</html>
