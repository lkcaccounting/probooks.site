<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProBooks — Admin Panel</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-wrap" id="verify-screen">
  <div class="login-box" style="max-width:380px;">
    <div style="text-align:center;font-size:32px;margin-bottom:12px;">🔐</div>
    <h1 style="font-size:20px;text-align:center;">Admin Access</h1>
    <p style="text-align:center;">Enter your admin password to continue.</p>
    <div id="alert-box-verify"></div>
    <div class="form-group">
      <input type="password" id="admin-gate-pwd" class="form-control" placeholder="Admin password">
    </div>
    <div class="flex gap-10">
      <a href="login.html" class="btn btn-outline" style="flex:1;justify-content:center;">← Back</a>
      <button class="btn btn-primary" style="flex:1;" onclick="verifyGate()">Enter</button>
    </div>
  </div>
</div>

<div id="admin-main" class="hidden" style="padding:28px;max-width:900px;margin:0 auto;">
  <div class="flex-between mb-24">
    <div>
      <h1 style="font-size:22px;font-weight:700;">Admin Panel</h1>
      <p class="text-muted">Manage all businesses and users on ProBooks</p>
    </div>
    <div class="flex gap-10">
      <a href="login.html" class="btn btn-outline">← Back to Login</a>
      <button class="btn btn-primary" onclick="showAddBusiness()">+ Add Business</button>
    </div>
  </div>

  <div id="alert-admin"></div>

  <!-- Businesses list -->
  <div id="businesses-container"></div>

  <!-- Add Business Modal -->
  <div class="modal-overlay hidden" id="biz-modal">
    <div class="modal">
      <h2>➕ Add New Business</h2>
      <div class="form-group">
        <label class="form-label">Business Name</label>
        <input type="text" id="new-biz-name" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Business Type</label>
        <select id="new-biz-type" class="form-control">
          <option>Retail</option><option>Restaurant</option><option>Services</option>
          <option>Manufacturing</option><option>Wholesale</option><option>Other</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Currency</label>
          <select id="new-biz-currency" class="form-control">
            <option value="KES">KES</option><option value="USD">USD</option>
            <option value="UGX">UGX</option><option value="TZS">TZS</option>
            <option value="ZAR">ZAR</option><option value="GBP">GBP</option>
            <option value="EUR">EUR</option><option value="NGN">NGN</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Contact</label>
          <input type="text" id="new-biz-contact" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input type="text" id="new-biz-address" class="form-control">
      </div>
      <hr style="border-color:var(--border);margin:16px 0;">
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px;">Owner account for this business:</p>
      <div class="form-group">
        <label class="form-label">Owner Name</label>
        <input type="text" id="new-owner-name" class="form-control">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Owner Password</label>
          <input type="password" id="new-owner-pwd" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="new-owner-pwd2" class="form-control">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeBizModal()">Cancel</button>
        <button class="btn btn-primary" id="save-biz-btn" onclick="saveNewBusiness()">Create Business</button>
      </div>
    </div>
  </div>

  <!-- Add User Modal -->
  <div class="modal-overlay hidden" id="user-modal">
    <div class="modal">
      <h2>👤 Add User</h2>
      <p class="text-muted" style="margin-bottom:16px;" id="user-modal-biz-name"></p>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" id="new-user-name" class="form-control" placeholder="Full name (used to log in)">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select id="new-user-role" class="form-control">
          <option value="manager">Manager</option>
          <option value="sales">Sales Person</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="new-user-pwd" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm</label>
          <input type="password" id="new-user-pwd2" class="form-control">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeUserModal()">Cancel</button>
        <button class="btn btn-primary" id="save-user-btn" onclick="saveNewUser()">Add User</button>
      </div>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script>
  let allBusinesses = [];
  let activeModalBizId = null;

  function showAlert(msg, type = "danger", el = "alert-admin") {
    document.getElementById(el).innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => { document.getElementById(el).innerHTML = ""; }, 5000);
  }

  function verifyGate() {
    const pwd = document.getElementById("admin-gate-pwd").value;
    if (!isAdminSetup()) {
      document.getElementById("alert-box-verify").innerHTML =
        '<div class="alert alert-danger">Admin not set up. Please run setup first.</div>';
      return;
    }
    if (!verifyAdminPassword(pwd)) {
      document.getElementById("alert-box-verify").innerHTML =
        '<div class="alert alert-danger">Incorrect admin password.</div>';
      return;
    }
    document.getElementById("verify-screen").classList.add("hidden");
    document.getElementById("admin-main").classList.remove("hidden");
    loadAll();
  }

  async function loadAll() {
    allBusinesses = await getBusinesses();
    renderBusinesses();
  }

  async function renderBusinesses() {
    const container = document.getElementById("businesses-container");
    if (allBusinesses.length === 0) {
      container.innerHTML = '<p class="text-muted">No businesses yet. Add one above.</p>';
      return;
    }

    let html = "";
    for (const biz of allBusinesses) {
      const users = await getUsers(biz.id);
      html += `
        <div class="card mb-24">
          <div class="flex-between mb-16">
            <div>
              <h3 style="font-size:16px;">${biz.businessName}</h3>
              <span class="text-muted">${biz.businessType} · ${biz.currency} · ${biz.contact || ""}</span>
            </div>
            <button class="btn btn-primary btn-sm" onclick="showAddUser('${biz.id}','${biz.businessName}')">+ Add User</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Role</th><th>Action</th></tr></thead>
              <tbody>
                ${users.map(u => `
                  <tr>
                    <td>${u.name}</td>
                    <td><span class="role-pill role-${u.role}">${u.role}</span></td>
                    <td>${u.role !== "owner" ? `<button class="btn btn-danger btn-sm" onclick="removeUser('${biz.id}','${u.id}','${u.name}')">Remove</button>` : '<span class="text-muted">Owner</span>'}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>`;
    }
    container.innerHTML = html;
  }

  function showAddBusiness() { document.getElementById("biz-modal").classList.remove("hidden"); }
  function closeBizModal() { document.getElementById("biz-modal").classList.add("hidden"); }
  function showAddUser(bizId, bizName) {
    activeModalBizId = bizId;
    document.getElementById("user-modal-biz-name").textContent = "Business: " + bizName;
    document.getElementById("user-modal").classList.remove("hidden");
  }
  function closeUserModal() { document.getElementById("user-modal").classList.add("hidden"); }

  async function saveNewBusiness() {
    const name = document.getElementById("new-biz-name").value.trim();
    const ownerName = document.getElementById("new-owner-name").value.trim();
    const p1 = document.getElementById("new-owner-pwd").value;
    const p2 = document.getElementById("new-owner-pwd2").value;
    if (!name || !ownerName || !p1) return showAlert("All fields required.");
    if (p1 !== p2) return showAlert("Passwords don't match.");
    if (p1.length < 6) return showAlert("Password min 6 characters.");

    const btn = document.getElementById("save-biz-btn");
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    try {
      const bizRef = await db.collection("businesses").add({
        businessName: name,
        businessType: document.getElementById("new-biz-type").value,
        currency: document.getElementById("new-biz-currency").value,
        contact: document.getElementById("new-biz-contact").value.trim(),
        address: document.getElementById("new-biz-address").value.trim(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      await db.collection("businesses").doc(bizRef.id).collection("users").add({
        name: ownerName, passwordHash: hashString(p1), role: "owner",
        businessName: name, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      closeBizModal();
      await loadAll();
      showAlert("Business created successfully!", "success");
    } catch (e) { showAlert("Error: " + e.message); }
    btn.innerHTML = "Create Business"; btn.disabled = false;
  }

  async function saveNewUser() {
    const name = document.getElementById("new-user-name").value.trim();
    const role = document.getElementById("new-user-role").value;
    const p1 = document.getElementById("new-user-pwd").value;
    const p2 = document.getElementById("new-user-pwd2").value;
    if (!name || !p1) return showAlert("All fields required.");
    if (p1 !== p2) return showAlert("Passwords don't match.");
    if (p1.length < 6) return showAlert("Password min 6 characters.");

    const btn = document.getElementById("save-user-btn");
    btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;

    try {
      await createUser(activeModalBizId, name, p1, role);
      closeUserModal();
      await loadAll();
      showAlert("User added successfully!", "success");
    } catch (e) { showAlert("Error: " + e.message); }
    btn.innerHTML = "Add User"; btn.disabled = false;
  }

  async function removeUser(bizId, userId, name) {
    if (!confirm(`Remove user "${name}"? This cannot be undone.`)) return;
    try {
      await deleteUser(bizId, userId);
      await loadAll();
      showAlert("User removed.", "success");
    } catch (e) { showAlert("Error: " + e.message); }
  }
</script>
</body>
</html>
